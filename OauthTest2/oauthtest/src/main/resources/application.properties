spring.application.name=oauthtest


# DataSource - MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/aloha?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&autoReconnection=true
spring.datasource.username=aloha
spring.datasource.password=123456
# Mybatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.hello0a.oauth1.domain
mybatis.mapper-locations=classpath:com/hello0a/oauth1/mapper/**/**.xml
# [개선] Logging - INFO 레벨 (기존: DEBUG)
logging.level.root=INFO
logging.level.com.hello0a.oauth1=INFO

# HS512 secret key
# [개선] 환경변수 우선, 기본값 fallback
com.hello0a.oauth1.secret-key=${JWT_SECRET_KEY:2Pyq[MyRMH(DxP'K)ONVI\LB29GD:xbB]?`\{ogZ[}#*)hx7/~68FxK2)HJdCPZ#A&[CBg{v9+T2c122}

# 카카오 REST API 키
spring.config.import=application-secret.properties

kakao.client-id=${KAKAO_CLIENT_ID}
kakao.client-secret=${KAKAO_CLIENT_SECRET}
kakao.redirect-uri=${KAKAO_REDIRECT_URI}